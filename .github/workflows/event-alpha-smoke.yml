name: Event Alpha Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  event-alpha-smoke:
    name: Event Alpha Smoke (Python 3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      RSI_EVENT_ALERTS_ENABLED: "0"
      RSI_EVENT_RESEARCH_NOW: "2026-06-15T16:00:00Z"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: python3 -m pip install --disable-pip-version-check --require-hashes -r requirements.txt
      - name: Integrated radar smoke
        run: make event-alpha-integrated-radar-smoke PYTHON=python3
      - name: Integrated radar doctor
        run: make event-alpha-integrated-radar-doctor PYTHON=python3
      - name: Live provider readiness smoke
        run: make event-alpha-live-provider-readiness-smoke PYTHON=python3
      - name: Coinalyze preflight smoke
        run: make event-alpha-coinalyze-preflight-smoke PYTHON=python3
