name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency audit (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pinned dependency tooling
        run: python3 -m pip install --disable-pip-version-check uv==0.11.28 pip-audit==2.10.1
      - name: Verify dependency lock
        if: matrix.python-version == '3.13'
        run: make dependency-lock-check UV=uv
      - name: Audit dependencies
        run: make dependency-audit PYTHON=python3

  verify:
    name: Verify (Python ${{ matrix.python-version }})
    needs: dependency-audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    env:
      CI: "true"
      RSI_EVENT_ALERTS_ENABLED: "0"
      RSI_EVENT_RESEARCH_NOW: "2026-06-15T16:00:00Z"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: python3 -m pip install --disable-pip-version-check --require-hashes -r requirements.txt
      - name: Compile
        run: python3 -m compileall -q crypto_rsi_scanner tests
      - name: Architecture health
        if: matrix.python-version == '3.13'
        run: |
          make architecture-baseline PYTHON=python3
          make architecture-size-gates PYTHON=python3
          make architecture-class-ownership-report PYTHON=python3
          make architecture-final-report PYTHON=python3
          make architecture-completion-map PYTHON=python3
          make architecture-naming-check PYTHON=python3
      - name: Make verify
        run: make verify PYTHON=python3
